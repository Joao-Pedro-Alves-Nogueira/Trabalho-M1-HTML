<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Livros</title>
</head>
<body style="background-color: #F5F5DC; color: #4B3621;">
    <center><header><img src="imagens/logo_livraria.png" alt="Logo" width="300"><h1>Estoque</h1></header></center>
    <main>
        <form>
            <label>Título:</label><br><input type="text" name="titulo"><br>
            <label>ISBN:</label><br><input type="text" name="isbn"><br>
            <label>Preço:</label><br><input type="number" step="0.01" name="preco"><br>
            <label>Categoria:</label><br><input type="text" name="cat" list="sugestoes-categoria"><br>
            <datalist id="sugestoes-categoria">
                <option value="Terror"></option>
                <option value="Ficção Científica"></option>
                <option value="Romance"></option>
                <option value="Fantasia"></option>
                <option value="Suspense"></option>
            </datalist>
            <label>Editora:</label><br><input type="text" name="editora"><br><br>
            <button type="submit">Salvar Livro</button>
        </form>
        <p><a href="index.html">Voltar ao Início</a></p>
    </main>
</body>
</html>
