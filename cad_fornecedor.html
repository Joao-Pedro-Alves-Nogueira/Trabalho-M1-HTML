<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Fornecedor</title>
</head>
<body style="background-color: #F5F5DC; color: #4B3621;">
    <center><header><img src="imagens/logo_livraria.png" alt="Logo" width="300"><h1>Fornecedores</h1></header></center>
    <main>
        <form>
            <label>Razão Social:</label><br><input type="text" name="razao"><br>
            <label>CNPJ:</label><br><input type="text" name="cnpj"><br>
            <label>Cidade:</label><br><input type="text" name="cidade"><br>
            <label>Representante:</label><br><input type="text" name="rep"><br>
            <label>E-mail Contato:</label><br><input type="email" name="e_forn"><br><br>
            <button type="submit">Salvar Fornecedor</button>
        </form>
        <p><a href="index.html">Voltar ao Início</a></p>
    </main>
</body>
</html>
